<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0B0F" />
  <title>Torque Fitness · Orçamentos</title>
  <meta name="description" content="Ferramenta de orçamento Torque Fitness — modo Admin e modo Vendedor." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%230B0B0F' stroke='%238B5CF6' stroke-width='6'/%3E%3Ccircle cx='50' cy='50' r='10' fill='%238B5CF6'/%3E%3Cline x1='50' y1='50' x2='74' y2='32' stroke='%238B5CF6' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E" />
</head>
<body data-mode="vendedor">

  <!-- ===================== HEADER ===================== -->
  <header class="topbar">
    <div class="brand">
      <span class="brand__mark" aria-hidden="true">
        <svg viewBox="0 0 100 100" class="gauge gauge--logo">
          <circle cx="50" cy="50" r="44" class="gauge__rim" />
          <path class="gauge__arc" d="M22 74 A 38 38 0 1 1 78 74" />
          <g class="gauge__ticks"></g>
          <line x1="50" y1="50" x2="73" y2="33" class="gauge__needle" />
          <circle cx="50" cy="50" r="7" class="gauge__hub" />
        </svg>
      </span>
      <span class="brand__text">
        <strong>TORQUE</strong><em>FITNESS</em>
        <small>Orçamentos</small>
      </span>
    </div>

    <button id="modeToggle" class="mode-toggle" type="button" aria-label="Alternar modo">
      <span class="mode-toggle__opt" data-for="vendedor">Vendedor</span>
      <span class="mode-toggle__opt" data-for="admin">Admin</span>
      <span class="mode-toggle__knob"></span>
    </button>
  </header>

  <!-- ===================== ADMIN CONFIG PANEL ===================== -->
  <section id="configPanel" class="config admin-only" hidden>
    <div class="config__head">
      <h2>Parâmetros gerais</h2>
      <button class="btn btn--ghost config__collapse" id="configCollapse" type="button">Recolher</button>
    </div>
    <div class="config__grid" id="configGrid">
      <label class="field">
        <span>Câmbio (US$ → R$)</span>
        <input type="number" step="0.01" min="0" id="cfgCambio" inputmode="decimal" />
      </label>
      <label class="field">
        <span>Frete (%)</span>
        <input type="number" step="0.1" min="0" id="cfgFrete" inputmode="decimal" />
      </label>
      <label class="field">
        <span>Impostos / Markup (%)</span>
        <input type="number" step="0.1" min="0" id="cfgImpostos" inputmode="decimal" />
      </label>
      <label class="field">
        <span>Margem padrão (%)</span>
        <input type="number" step="0.1" min="0" id="cfgMargem" inputmode="decimal" />
      </label>
      <label class="field field--switch">
        <span>Custo em dólar</span>
        <input type="checkbox" id="cfgCustoDolar" class="switch" />
      </label>
      <label class="field">
        <span>Parcelas máx.</span>
        <input type="number" step="1" min="1" max="96" id="cfgParcelas" inputmode="numeric" />
      </label>
      <label class="field">
        <span>Juros a.m. (%) <small>0 = sem juros</small></span>
        <input type="number" step="0.01" min="0" id="cfgJuros" inputmode="decimal" />
      </label>
      <label class="field">
        <span>Validade (dias)</span>
        <input type="number" step="1" min="1" id="cfgValidade" inputmode="numeric" />
      </label>
    </div>
    <div class="config__actions">
      <button class="btn btn--primary" id="btnImport" type="button">Importar planilha</button>
      <button class="btn btn--ghost" id="btnAddProduct" type="button">+ Novo produto</button>
      <button class="btn btn--ghost" id="btnResetData" type="button">Restaurar exemplo</button>
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" hidden />
    </div>
  </section>

  <!-- ===================== TOOLBAR (filters/search) ===================== -->
  <section class="toolbar">
    <div class="search">
      <svg viewBox="0 0 24 24" class="search__icon" aria-hidden="true"><path d="M10 4a6 6 0 104.47 10.03l4.25 4.25 1.41-1.41-4.25-4.25A6 6 0 0010 4zm0 2a4 4 0 110 8 4 4 0 010-8z"/></svg>
      <input type="search" id="searchInput" placeholder="Buscar por nome ou código…" autocomplete="off" />
    </div>
    <div class="chips" id="serieChips" role="tablist" aria-label="Categorias"></div>
  </section>

  <!-- ===================== PRODUCT LIST ===================== -->
  <main class="catalog">
    <div id="productGrid" class="grid"></div>
    <p id="emptyState" class="empty" hidden>Nenhum produto encontrado.</p>
  </main>

  <!-- ===================== VENDOR SUMMARY (cart) ===================== -->
  <aside id="summaryBar" class="summary vendor-only">
    <button class="summary__handle" id="summaryHandle" type="button">
      <span class="summary__count"><b id="cartCount">0</b> itens</span>
      <span class="summary__total" id="cartTotalMini">R$ 0,00</span>
      <span class="summary__chev">▲</span>
    </button>
    <div class="summary__body" id="summaryBody">
      <h2>Resumo do orçamento</h2>
      <div id="summaryItems" class="summary__items"></div>
      <div class="summary__totals">
        <div class="row"><span>Subtotal</span><b id="sumSubtotal">R$ 0,00</b></div>
        <div class="row row--grand"><span>Total geral</span><b id="sumTotal">R$ 0,00</b></div>
      </div>
      <div class="installments">
        <div class="installments__head">
          <span>Parcelamento</span>
          <select id="installSelect" aria-label="Número de parcelas"></select>
        </div>
        <div class="installments__value" id="installValue">—</div>
        <small id="installNote" class="installments__note"></small>
      </div>
      <div class="summary__actions">
        <button class="btn btn--ghost" id="btnClearCart" type="button">Limpar</button>
        <button class="btn btn--primary" id="btnExport" type="button">Gerar orçamento</button>
      </div>
    </div>
  </aside>

  <!-- ===================== PRODUCT EDIT MODAL (admin) ===================== -->
  <div class="modal" id="editModal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="editTitle">
      <header class="modal__head">
        <h2 id="editTitle">Editar produto</h2>
        <button class="modal__x" data-close type="button" aria-label="Fechar">✕</button>
      </header>
      <form id="editForm" class="modal__body">
        <input type="hidden" id="edId" />
        <div class="form-grid">
          <label class="field"><span>Código</span><input id="edCodigo" type="text" /></label>
          <label class="field"><span>Série / Categoria</span><input id="edSerie" type="text" list="serieList" /></label>
          <label class="field field--wide"><span>Nome</span><input id="edNome" type="text" required /></label>
          <label class="field field--wide"><span>Imagem (URL)</span><input id="edImagem" type="url" placeholder="https://…" /></label>
          <label class="field"><span>Custo</span><input id="edCusto" type="number" step="0.01" min="0" inputmode="decimal" /></label>
          <label class="field"><span>Margem (%) <small>vazio = padrão</small></span><input id="edMargem" type="number" step="0.1" inputmode="decimal" /></label>
          <label class="field"><span>Preço manual <small>vazio = automático</small></span><input id="edPreco" type="number" step="0.01" min="0" inputmode="decimal" /></label>
          <label class="field field--switch"><span>Ocultar do vendedor</span><input id="edOculto" type="checkbox" class="switch" /></label>
        </div>
        <datalist id="serieList"></datalist>
        <div class="price-preview" id="pricePreview"></div>
      </form>
      <footer class="modal__foot">
        <button class="btn btn--danger" id="btnDeleteProduct" type="button">Remover</button>
        <span class="spacer"></span>
        <button class="btn btn--ghost" data-close type="button">Cancelar</button>
        <button class="btn btn--primary" id="btnSaveProduct" type="button">Salvar</button>
      </footer>
    </div>
  </div>

  <!-- ===================== IMPORT MAPPING MODAL (admin) ===================== -->
  <div class="modal" id="importModal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="importTitle">
      <header class="modal__head">
        <h2 id="importTitle">Importar planilha</h2>
        <button class="modal__x" data-close type="button" aria-label="Fechar">✕</button>
      </header>
      <div class="modal__body">
        <p class="hint">Detectamos as colunas abaixo. Confirme o mapeamento e importe.</p>
        <div class="form-grid" id="mapGrid"></div>
        <label class="field field--switch" style="margin-top:14px">
          <span>Substituir catálogo atual <small>(desmarcado = adicionar)</small></span>
          <input id="impReplace" type="checkbox" class="switch" checked />
        </label>
        <div class="import-preview" id="importPreview"></div>
      </div>
      <footer class="modal__foot">
        <span class="spacer"></span>
        <button class="btn btn--ghost" data-close type="button">Cancelar</button>
        <button class="btn btn--primary" id="btnDoImport" type="button">Importar produtos</button>
      </footer>
    </div>
  </div>

  <!-- ===================== QUOTE / EXPORT MODAL ===================== -->
  <div class="modal modal--quote" id="quoteModal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__card modal__card--quote" role="dialog" aria-modal="true">
      <header class="modal__head no-print">
        <h2>Orçamento</h2>
        <button class="modal__x" data-close type="button" aria-label="Fechar">✕</button>
      </header>
      <div class="modal__body modal__body--quote">
        <div class="quote-meta no-print">
          <label class="field"><span>Cliente</span><input id="qCliente" type="text" placeholder="Nome do cliente" /></label>
          <label class="field"><span>Vendedor</span><input id="qVendedor" type="text" placeholder="Seu nome" /></label>
        </div>

        <!-- Printable / capturable area -->
        <div id="quoteDoc" class="quote-doc"></div>
      </div>
      <footer class="modal__foot no-print">
        <button class="btn btn--ghost" id="btnShareQuote" type="button">Compartilhar</button>
        <span class="spacer"></span>
        <button class="btn btn--ghost" id="btnImageQuote" type="button">Imagem (PNG)</button>
        <button class="btn btn--primary" id="btnPdfQuote" type="button">Salvar PDF</button>
      </footer>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <script src="js/seed.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
