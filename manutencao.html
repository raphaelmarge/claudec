<body>

  <!-- ===================== HEADER ===================== -->
  <header class="topbar">
    <div class="brand__mark">
      <svg viewBox="0 0 227 271" class="logo-mark" aria-hidden="true"><g transform="translate(0,271) scale(0.1,-0.1)"><path d="M130 2617 c-50 -26 -50 -19 -50 -685 0 -686 -2 -669 61 -691 34 -12 367 -14 406 -3 12 4 105 84 205 178 533 498 494 463 524 455 38 -10 70 -54 58 -81 -5 -11 -268 -262 -584 -558 -586 -547 -620 -584 -652 -682 -6 -19 -13 -125 -15 -236 -6 -224 -3 -234 62 -234 30 0 96 59 706 630 601 563 677 630 703 628 18 -2 37 -14 50 -31 19 -26 19 -30 5 -55 -8 -15 -289 -283 -624 -597 l-609 -570 887 -3 c609 -1 894 1 908 8 19 11 20 24 17 973 -3 944 -4 963 -24 1023 -88 255 -268 427 -539 511 l-90 27 -690 3 c-546 3 -695 1 -715 -10z"/></g></svg>
    </div>
    <div class="brand__text"><strong>TORQUE FITNESS</strong><em>MANUTENÇÕES</em></div>
    <button type="button" class="iconbtn" id="btnBackup" title="Backup e dados" aria-label="Backup e dados">⚙</button>
  </header>

  <main class="wrap">
    <section id="view-painel" class="view"></section>
    <section id="view-chamados" class="view" hidden></section>
    <section id="view-planos" class="view" hidden></section>
    <section id="view-ativos" class="view" hidden></section>
  </main>

  <!-- ===================== TAB BAR ===================== -->
  <nav class="tabbar" aria-label="Seções">
    <button type="button" class="tab is-active" data-tab="painel"><span class="tab__ico">📊</span>Painel</button>
    <button type="button" class="tab" data-tab="chamados"><span class="tab__ico">🛠️</span>Chamados</button>
    <button type="button" class="tab" data-tab="planos"><span class="tab__ico">🔁</span>Preventivas</button>
    <button type="button" class="tab" data-tab="ativos"><span class="tab__ico">🏋️</span>Ativos</button>
  </nav>

  <!-- ===================== MODAL ===================== -->
  <div id="modal" class="modal" hidden>
    <div class="modal__card" role="dialog" aria-modal="true">
      <div class="modal__head">
        <h3 id="modalTitle"></h3>
        <button type="button" class="iconbtn" id="modalClose" aria-label="Fechar">✕</button>
      </div>
      <div class="modal__body" id="modalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <input type="file" id="importFile" accept="application/json,.json" hidden />
  <input type="file" id="fotoFile" accept="image/*" multiple hidden />

  <!-- visualizador de foto em tela cheia -->
  <div id="lightbox" class="lightbox" hidden>
    <button type="button" class="iconbtn lightbox__close" id="lightboxClose" aria-label="Fechar">✕</button>
    <img id="lightboxImg" alt="Foto do chamado" />
  </div>

  <script src="js/manutencao.js?v=20260703b"></script>
