name: Diagnóstico insert orcamentos
on: { workflow_dispatch: {} }
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Colunas reais da tabela orcamentos (OpenAPI do PostgREST)
        run: |
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxd2J5d3p1cW9vcXptaWtscWN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTUxODUsImV4cCI6MjA5NzczMTE4NX0._wPjsnUhBY0NzIR8odwsKg-uqyApZNkwjIfHKv9FxL4"
          curl -s "https://uqwbywzuqooqzmiklqct.supabase.co/rest/v1/" -H "apikey: $KEY" -H "Authorization: Bearer $KEY" -o /tmp/openapi.json
          echo "== colunas de orcamentos =="
          python3 - <<'PY'
          import json
          d = json.load(open('/tmp/openapi.json'))
          defs = d.get('definitions', {})
          orc = defs.get('orcamentos', {})
          for c, spec in orc.get('properties', {}).items():
              print(c, '·', spec.get('format', spec.get('type', '')))
          PY
