<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0B0F" />
  <title>Blog · Torque Fitness</title>
  <meta name="description" content="Dicas e conteúdos sobre como montar e equipar academias, studios e CrossFit — Torque Fitness." />
  <link rel="canonical" href="https://raphaelmarge.github.io/claudec/blog.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Torque Fitness" />
  <meta property="og:title" content="Blog · Torque Fitness" />
  <meta property="og:description" content="Dicas e conteúdos sobre como montar e equipar academias." />
  <meta property="og:url" content="https://raphaelmarge.github.io/claudec/blog.html" />
  <meta property="og:image" content="https://raphaelmarge.github.io/claudec/assets/og.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/site.css?v=20260627p" />
  <style>
    .blog{max-width:820px;margin:0 auto;padding:34px 20px 60px}
    .blog__back{display:inline-flex;align-items:center;gap:6px;color:var(--txt-dim);font-size:.86rem;margin-bottom:20px}
    .blog__back:hover{color:var(--violet)}
    .blog h1{font-size:2.2rem;line-height:1.1;margin:0 0 6px}
    .blog__lead{color:var(--txt-dim);margin:0 0 26px}
    .postlist{display:grid;gap:18px}
    .postcard{display:block;background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:border-color .15s,transform .12s}
    .postcard:hover{border-color:var(--violet);transform:translateY(-2px)}
    .postcard__img{width:100%;aspect-ratio:16/8;object-fit:cover;background:var(--panel-2)}
    .postcard__b{padding:18px 20px}
    .postcard__meta{font-size:.74rem;color:var(--txt-mut);text-transform:uppercase;letter-spacing:.05em}
    .postcard h2{font-size:1.25rem;margin:6px 0 6px}
    .postcard p{color:var(--txt-dim);font-size:.92rem;margin:0;line-height:1.5}
    .article__cover{width:100%;max-height:380px;object-fit:cover;border-radius:16px;margin:0 0 22px;background:var(--panel-2)}
    .article__meta{color:var(--txt-mut);font-size:.84rem;margin:0 0 22px}
    .article__body{color:var(--txt);line-height:1.75;font-size:1.04rem}
    .article__body h2{font-size:1.4rem;margin:30px 0 10px}
    .article__body p{margin:0 0 16px}
    .article__body ul{margin:0 0 16px;padding-left:22px}
    .article__body li{margin:4px 0}
    .article__cta{margin-top:34px;padding-top:24px;border-top:1px solid var(--line);display:flex;gap:12px;flex-wrap:wrap}
    .blog__empty{color:var(--txt-dim);text-align:center;padding:50px 0}
  </style>
</head>
<body>
  <header class="nav" id="nav">
    <a class="nav__brand" href="./">
      <svg viewBox="0 0 227 271" class="nav__mark"><g transform="translate(0,271) scale(0.1,-0.1)"><path d="M130 2617 c-50 -26 -50 -19 -50 -685 0 -686 -2 -669 61 -691 34 -12 367 -14 406 -3 12 4 105 84 205 178 533 498 494 463 524 455 38 -10 70 -54 58 -81 -5 -11 -268 -262 -584 -558 -586 -547 -620 -584 -652 -682 -6 -19 -13 -125 -15 -236 -6 -224 -3 -234 62 -234 30 0 96 59 706 630 601 563 677 630 703 628 18 -2 37 -14 50 -31 19 -26 19 -30 5 -55 -8 -15 -289 -283 -624 -597 l-609 -570 887 -3 c609 -1 894 1 908 8 19 11 20 24 17 973 -3 944 -4 963 -24 1023 -88 255 -268 427 -539 511 l-90 27 -690 3 c-546 3 -695 1 -715 -10z"/></g></svg>
      <span><strong>TORQUE FITNESS</strong><em>EQUIPAMENTOS</em></span>
    </a>
    <div class="nav__actions">
      <a class="nav__vendor" href="./">← Voltar ao site</a>
    </div>
  </header>

  <main class="blog" id="blog">
    <p class="blog__empty">Carregando…</p>
  </main>

  <script src="js/config.js?v=20260627p"></script>
  <script>
    (function () {
      var $ = function (s, r) { return (r || document).querySelector(s); };
      var esc = function (s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]; }); };
      var fmtData = function (d) { if (!d) return ''; try { return new Date(d + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' }); } catch (e) { return d; } };
      function md(t) {
        var lines = String(t || '').split('\n'), html = '', inList = false, para = [];
        function flush() { if (para.length) { html += '<p>' + para.map(esc).join('<br>') + '</p>'; para = []; } }
        function closeL() { if (inList) { html += '</ul>'; inList = false; } }
        lines.forEach(function (ln) {
          var s = ln.trim();
          if (s.indexOf('## ') === 0) { flush(); closeL(); html += '<h2>' + esc(s.slice(3)) + '</h2>'; }
          else if (s.indexOf('- ') === 0) { flush(); if (!inList) { html += '<ul>'; inList = true; } html += '<li>' + esc(s.slice(2)) + '</li>'; }
          else if (s === '') { flush(); closeL(); }
          else { closeL(); para.push(ln); }
        });
        flush(); closeL();
        return html;
      }
      var BASE = location.origin + location.pathname.replace(/[^/]*$/, '');
      var WPP = '';

      function renderList(posts) {
        document.title = 'Blog · Torque Fitness';
        if (!posts.length) { $('#blog').innerHTML = '<a class="blog__back" href="./">← Voltar ao site</a><h1>Blog</h1><p class="blog__empty">Em breve, novos conteúdos por aqui. 💪</p>'; return; }
        var cards = posts.map(function (p) {
          var img = p.capa ? '<img class="postcard__img" src="' + esc(p.capa) + '" alt="" loading="lazy" />' : '';
          return '<a class="postcard" href="blog.html?post=' + encodeURIComponent(p.slug) + '">' + img +
            '<div class="postcard__b"><div class="postcard__meta">' + esc(fmtData(p.data)) + (p.autor ? ' · ' + esc(p.autor) : '') + '</div>' +
            '<h2>' + esc(p.titulo) + '</h2>' + (p.resumo ? '<p>' + esc(p.resumo) + '</p>' : '') + '</div></a>';
        }).join('');
        $('#blog').innerHTML = '<a class="blog__back" href="./">← Voltar ao site</a><h1>Blog</h1><p class="blog__lead">Dicas e conteúdos para montar e equipar sua academia.</p><div class="postlist">' + cards + '</div>';
      }
      function renderPost(p, posts) {
        document.title = p.titulo + ' · Torque Fitness';
        var m = document.querySelector('meta[name="description"]'); if (m) m.content = p.resumo || p.titulo;
        var cap = p.capa ? '<img class="article__cover" src="' + esc(p.capa) + '" alt="' + esc(p.titulo) + '" />' : '';
        var n = WPP.replace(/\D/g, '');
        var wppHref = (n ? 'https://wa.me/' + n : 'https://wa.me/') + '?text=' + encodeURIComponent('Olá! Vi o artigo "' + p.titulo + '" e quero saber mais sobre os equipamentos.');
        $('#blog').innerHTML = '<a class="blog__back" href="blog.html">← Todos os artigos</a>' +
          '<h1>' + esc(p.titulo) + '</h1><p class="article__meta">' + esc(fmtData(p.data)) + (p.autor ? ' · por ' + esc(p.autor) : '') + '</p>' +
          cap + '<div class="article__body">' + md(p.conteudo) + '</div>' +
          '<div class="article__cta"><a class="btn btn--primary" href="' + esc(wppHref) + '" target="_blank" rel="noopener">📱 Falar no WhatsApp</a><a class="btn btn--ghost" href="./#produtos">Ver equipamentos</a></div>';
        // Article JSON-LD
        var ld = document.createElement('script'); ld.type = 'application/ld+json';
        ld.textContent = JSON.stringify({ '@context': 'https://schema.org', '@type': 'Article', headline: p.titulo, description: p.resumo || '', image: p.capa || undefined, datePublished: p.data || undefined, author: { '@type': 'Organization', name: p.autor || 'Torque Fitness' }, publisher: { '@type': 'Organization', name: 'Torque Fitness' } });
        document.head.appendChild(ld);
      }
      function route(posts) {
        var slug = new URLSearchParams(location.search).get('post');
        if (slug) { var p = posts.filter(function (x) { return x.slug === slug; })[0]; if (p) return renderPost(p, posts); }
        renderList(posts);
      }
      (function load() {
        var cfg = window.TORQUE_SUPABASE;
        if (!cfg || !cfg.url) { renderList([]); return; }
        var url = cfg.url.replace(/\/+$/, '') + '/storage/v1/object/public/produtos/catalog.json?t=' + Date.now();
        fetch(url).then(function (r) { return r.ok ? r.json() : null; }).then(function (data) {
          var site = (data && data.site) || {};
          WPP = site.whatsapp || '';
          var posts = Array.isArray(site.blog) ? site.blog : [];
          route(posts);
        }).catch(function () { renderList([]); });
      })();
    })();
  </script>
</body>
</html>
